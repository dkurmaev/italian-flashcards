<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italiano — Разговорник</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f4;
  --surface: #ffffff;
  --surface2: #f2efe8;
  --border: #e8e3d8;
  --text: #1c1a16;
  --muted: #7a7163;
  --accent: #c8401a;
  --accent2: #e8a020;
  --green: #2a7a4a;
  --red: #c03030;
  --blue: #1a5a8a;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}


.shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto;
}
.main { flex: 1; overflow-y: auto; }


.logo {
  padding: 1.5rem 1.25rem 1rem;
  border-bottom: 1px solid var(--border);
}
.logo-flag { font-size: 28px; margin-bottom: 4px; }
.logo-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px; color: var(--accent);
  line-height: 1.1;
}
.logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 2px; }

.nav-section { padding: 1rem 0.75rem 0.25rem; }
.nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 0 0.5rem; margin-bottom: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  cursor: pointer; font-size: 13px; color: var(--muted);
  transition: all 0.15s; border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: #fce8e2; color: var(--accent); font-weight: 500; }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.nav-item .count { margin-left: auto; font-size: 11px; background: var(--surface2); padding: 1px 7px; border-radius: 10px; }
.nav-item.active .count { background: #f9c4b4; }

.mode-bar {
  margin-top: auto; padding: 1rem 0.75rem;
  border-top: 1px solid var(--border);
}
.mode-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
.mode-btns { display: flex; flex-direction: column; gap: 4px; }
.mode-btn {
  padding: 8px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  font-size: 13px; cursor: pointer; text-align: left;
  color: var(--muted); display: flex; align-items: center; gap: 8px;
  font-family: 'DM Sans', sans-serif;
}
.mode-btn:hover { background: var(--surface2); color: var(--text); }
.mode-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }


.topbar {
  padding: 1.25rem 2rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.page-title { font-family: 'DM Serif Display', serif; font-size: 24px; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px;
}
.search-box input {
  border: none; background: none; outline: none;
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  color: var(--text); width: 180px;
}
.search-box input::placeholder { color: var(--muted); }

.content { padding: 1.5rem 2rem 3rem; }


.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.phrase-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.phrase-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); border-color: #d0c8b8; }
.phrase-card .ru { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
.phrase-card .it { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.phrase-card .pr { font-size: 12px; color: var(--accent); font-style: italic; }
.phrase-card .tag {
  position: absolute; top: 10px; right: 10px;
  font-size: 10px; background: var(--surface2);
  color: var(--muted); padding: 2px 8px; border-radius: 10px;
}
.phrase-card.fav .tag-fav { color: var(--accent2); }


.fc-wrap {
  max-width: 560px; margin: 2rem auto; text-align: center;
}
.fc-progress { font-size: 13px; color: var(--muted); margin-bottom: 1rem; }
.fc-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 2rem; }
.fc-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.fc-card {
  height: 260px; perspective: 1000px; cursor: pointer; margin-bottom: 1.5rem;
}
.fc-inner {
  width: 100%; height: 100%;
  transform-style: preserve-3d; transition: transform 0.5s;
  position: relative;
}
.fc-inner.flipped { transform: rotateY(180deg); }
.fc-face {
  position: absolute; inset: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; backface-visibility: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem;
}
.fc-back { background: var(--surface2); transform: rotateY(180deg); }
.fc-face-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px; }
.fc-word { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); margin-bottom: 10px; }
.fc-pron { font-size: 16px; color: var(--accent); font-style: italic; margin-bottom: 8px; }
.fc-topic { font-size: 12px; color: var(--muted); }
.fc-hint { font-size: 12px; color: var(--muted); margin-bottom: 1.5rem; }
.fc-nav { display: flex; align-items: center; justify-content: center; gap: 16px; }
.fc-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.fc-btn:hover { background: var(--surface2); }
.fc-shuffle { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: transparent; font-family: 'DM Sans',sans-serif; font-size: 13px; cursor: pointer; color: var(--text); }
.fc-shuffle:hover { background: var(--surface2); }

.quiz-wrap { max-width: 560px; margin: 2rem auto; }
.quiz-q {
  font-family: 'DM Serif Display', serif;
  font-size: 28px; text-align: center; margin-bottom: 6px;
}
.quiz-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 2rem; }
.quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.quiz-opt {
  padding: 16px 14px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  font-family: 'DM Sans',sans-serif; font-size: 14px; cursor: pointer;
  text-align: center; line-height: 1.5; transition: all 0.15s; white-space: pre-line;
}
.quiz-opt:hover:not(:disabled) { background: var(--surface2); border-color: #c8c0b0; }
.quiz-opt.correct { background: #d4f0e0; color: #1a5a30; border-color: #80c8a0; }
.quiz-opt.wrong { background: #fde8e8; color: #8a2020; border-color: #e09090; }
.quiz-stats { display: flex; gap: 10px; margin-bottom: 1rem; }
.stat-box { flex:1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
.stat-num { font-family: 'DM Serif Display',serif; font-size: 28px; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

.type-wrap { max-width: 480px; margin: 2rem auto; text-align: center; }
.type-q { font-family: 'DM Serif Display',serif; font-size: 30px; margin-bottom: 6px; }
.type-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
.type-input {
  width: 100%; padding: 14px 18px;
  border: 2px solid var(--border); border-radius: var(--radius);
  background: var(--surface); font-size: 18px; text-align: center;
  outline: none; font-family: 'DM Sans',sans-serif; color: var(--text);
  margin-bottom: 12px; transition: border-color 0.2s;
}
.type-input:focus { border-color: var(--accent); }
.type-fb { font-size: 15px; font-weight: 500; min-height: 26px; margin-bottom: 12px; }
.type-check {
  padding: 11px 28px; border-radius: 8px;
  border: 1px solid var(--text); background: var(--text);
  color: var(--bg); font-size: 14px; cursor: pointer; font-family: 'DM Sans',sans-serif;
}
.type-check:hover { opacity: 0.85; }


.section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.section-hdr h3 {
  font-family: 'DM Serif Display',serif; font-size: 20px;
}
.section-hdr .cnt { font-size: 13px; color: var(--muted); }
.section-sep { height: 1px; background: var(--border); margin: 2rem 0; }


.hamburger { display: none; }
@media (max-width: 700px) {
  .sidebar { position: fixed; left: -240px; top: 0; height: 100%; z-index: 100; transition: left 0.25s; }
  .sidebar.open { left: 0; box-shadow: 4px 0 24px rgba(0,0,0,0.15); }
  .hamburger { display: block; font-size: 22px; background: none; border: none; cursor: pointer; color: var(--text); }
  .topbar { padding: 1rem; gap: 8px; }
  .search-box input { width: 120px; }
  .content { padding: 1rem; }
  .cards-grid { grid-template-columns: 1fr; }
  .quiz-opts { grid-template-columns: 1fr; }
}
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
.overlay.show { display: block; }


.empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-flag">🇮🇹</div>
      <div class="logo-title">Italiano</div>
      <div class="logo-sub">Разговорник</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Категории</div>
      <div id="navList"></div>
    </div>

    <div class="mode-bar">
      <div class="mode-label">Режим</div>
      <div class="mode-btns">
        <button class="mode-btn active" onclick="setMode('browse')" id="mb-browse">📖 Все фразы</button>
        <button class="mode-btn" onclick="setMode('cards')" id="mb-cards">🃏 Карточки</button>
        <button class="mode-btn" onclick="setMode('quiz')" id="mb-quiz">🎯 Тест</button>
        <button class="mode-btn" onclick="setMode('type')" id="mb-type">⌨️ Написание</button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" onclick="openSidebar()">☰</button>
        <div class="page-title" id="pageTitle">Все фразы</div>
      </div>
      <div class="search-box">
        <span style="color:var(--muted);font-size:14px;">🔍</span>
        <input type="text" id="searchInput" placeholder="Поиск..." oninput="doSearch()">
      </div>
    </div>

    <div class="content" id="mainContent"></div>
  </div>
</div>

    {ru:"Ноябрь",  it:"Novembre", pr:"Новэмбрэ"},

const categories = Object.keys(DATA);
let activeCategory = "all";
let mode = "browse";
let searchQuery = "";
let cardIdx = 0, cardFlipped = false;
let quizIdx = 0, qC = 0, qW = 0, qS = 0;
let typeIdx = 0, tC = 0, tW = 0, typeAnswered = false;
let workingCards = [];

function getAllPhrases() {
  const all = [];
  categories.forEach(cat => DATA[cat].phrases.forEach(p => all.push({...p, cat})));
  return all;
}

function getCategoryPhrases(cat) {
  return DATA[cat].phrases.map(p => ({...p, cat}));
}

function getFiltered() {
  let list = activeCategory === "all" ? getAllPhrases() : getCategoryPhrases(activeCategory);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p => p.ru.toLowerCase().includes(q) || p.it.toLowerCase().includes(q) || p.pr.toLowerCase().includes(q));
  }
  return list;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}


function buildNav() {
  const el = document.getElementById("navList");
  const allCount = getAllPhrases().length;
  let html = `<button class="nav-item ${activeCategory==='all'?'active':''}" onclick="setCategory('all')">
    <span class="icon">🌐</span> Все фразы <span class="count">${allCount}</span></button>`;
  categories.forEach(cat => {
    const cnt = DATA[cat].phrases.length;
    html += `<button class="nav-item ${activeCategory===cat?'active':''}" onclick="setCategory('${cat}')">
      <span class="icon">${DATA[cat].icon}</span> ${cat} <span class="count">${cnt}</span></button>`;
  });
  el.innerHTML = html;
}

function setCategory(cat) {
  activeCategory = cat;
  searchQuery = "";
  document.getElementById("searchInput").value = "";
  cardIdx = 0; quizIdx = 0; typeIdx = 0;
  buildNav();
  render();
  closeSidebar();
}

function setMode(m) {
  mode = m;
  cardIdx = 0; quizIdx = 0; typeIdx = 0;
  qC=0; qW=0; qS=0; tC=0; tW=0;
  ["browse","cards","quiz","type"].forEach(x => {
    const b = document.getElementById("mb-"+x);
    if (b) b.classList.toggle("active", x===m);
  });
  workingCards = shuffle(getFiltered());
  render();
}

function doSearch() {
  searchQuery = document.getElementById("searchInput").value.trim();
  cardIdx = 0;
  render();
}

function render() {
  const title = activeCategory === "all" ? "Все фразы" : activeCategory;
  document.getElementById("pageTitle").textContent = title;
  if (mode === "browse") renderBrowse();
  else if (mode === "cards") renderCards();
  else if (mode === "quiz") renderQuiz();
  else if (mode === "type") renderType();
}


function renderBrowse() {
  const content = document.getElementById("mainContent");
  if (searchQuery) {
    const list = getFiltered();
    if (!list.length) { content.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>Ничего не найдено</div>`; return; }
    content.innerHTML = `<div class="section-hdr"><h3>Результаты: "${searchQuery}"</h3><span class="cnt">${list.length} фраз</span></div>
      <div class="cards-grid">${list.map(phraseCard).join("")}</div>`;
    return;
  }
  if (activeCategory !== "all") {
    const list = getCategoryPhrases(activeCategory);
    content.innerHTML = `<div class="section-hdr"><h3>${DATA[activeCategory].icon} ${activeCategory}</h3><span class="cnt">${list.length} фраз</span></div>
      <div class="cards-grid">${list.map(phraseCard).join("")}</div>`;
    return;
  }
  let html = "";
  categories.forEach((cat, i) => {
    const list = DATA[cat].phrases;
    html += `<div class="section-hdr"><h3>${DATA[cat].icon} ${cat}</h3><span class="cnt">${list.length}</span></div>
      <div class="cards-grid">${list.slice(0,6).map(p=>phraseCard({...p,cat})).join("")}</div>`;
    if (list.length > 6) html += `<div style="margin-bottom:8px;"><button onclick="setCategory('${cat}')" style="font-size:13px;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 0;">Показать все ${list.length} →</button></div>`;
    if (i < categories.length-1) html += `<div class="section-sep"></div>`;
  });
  content.innerHTML = html;
}

function phraseCard(p) {
  return `<div class="phrase-card">
    <div class="ru">${p.ru}</div>
    <div class="it">${p.it}</div>
    <div class="pr">${p.pr}</div>
    <div class="tag">${p.cat}</div>
  </div>`;
}


function renderCards() {
  const cards = getFiltered();
  if (!cards.length) { document.getElementById("mainContent").innerHTML = `<div class="empty"><div class="empty-icon">🃏</div>Нет карточек</div>`; return; }
  if (cardIdx >= cards.length) cardIdx = 0;
  const c = cards[cardIdx];
  const pct = Math.round(((cardIdx+1)/cards.length)*100);
  document.getElementById("mainContent").innerHTML = `
    <div class="fc-wrap">
      <div class="fc-progress">${cardIdx+1} / ${cards.length}</div>
      <div class="fc-bar"><div class="fc-bar-fill" style="width:${pct}%"></div></div>
      <div class="fc-card" onclick="fcFlip()">
        <div class="fc-inner" id="fcInner">
          <div class="fc-face">
            <div class="fc-face-label">🇷🇺 русский</div>
            <div class="fc-word">${c.ru}</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-face-label">🇮🇹 итальянский</div>
            <div class="fc-word">${c.it}</div>
            <div class="fc-pron">${c.pr}</div>
            <div class="fc-topic">${c.cat}</div>
          </div>
        </div>
      </div>
      <div class="fc-hint">👆 tap — перевернуть &nbsp;|&nbsp; 👈👉 swipe — листать</div>
      <div class="fc-nav">
        <button class="fc-btn" onclick="fcPrev()">←</button>
        <button class="fc-shuffle" onclick="fcShuffle()">🔀 Перемешать</button>
        <button class="fc-btn" onclick="fcNext()">→</button>
      </div>
    </div>`;
  cardFlipped = false;
  initSwipe();
}

function fcFlip() {
  cardFlipped = !cardFlipped;
  const el = document.getElementById("fcInner");
  if (el) el.classList.toggle("flipped", cardFlipped);
}
function fcNext() { const cards = getFiltered(); cardIdx = (cardIdx+1)%cards.length; renderCards(); }
function fcPrev() { const cards = getFiltered(); cardIdx = (cardIdx-1+cards.length)%cards.length; renderCards(); }

function initSwipe() {
  const card = document.querySelector(".fc-card");
  if (!card) return;
  let startX = 0, startY = 0, moved = false;
  card.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  }, {passive: true});
  card.addEventListener("touchmove", e => {
    moved = true;
  }, {passive: true});
  card.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (!moved || (Math.abs(dx) < 30 && Math.abs(dy) < 30)) return;
    if (Math.abs(dx) > Math.abs(dy)) {
    
      const inner = document.getElementById("fcInner");
      if (inner) {
        inner.style.transition = "transform 0.25s, opacity 0.2s";
        inner.style.opacity = "0";
        inner.style.transform = dx < 0 ? "rotateY(180deg) translateX(40px)" : "translateX(-40px)";
        setTimeout(() => {
          if (dx < 0) fcNext(); else fcPrev();
        }, 200);
      } else {
        if (dx < 0) fcNext(); else fcPrev();
      }
    } else {
     
      fcFlip();
    }
  }, {passive: true});
}
function fcShuffle() {
  const cards = shuffle(getFiltered());
  DATA[activeCategory === "all" ? null : activeCategory];
  workingCards = cards;
  cardIdx = 0; renderCards();
}


function renderQuiz() {
  const cards = getFiltered();
  const content = document.getElementById("mainContent");
  if (cards.length < 4) {
    content.innerHTML = `<div class="quiz-wrap"><div class="empty"><div class="empty-icon">🎯</div>Нужно минимум 4 фразы</div></div>`;
    return;
  }
  const c = cards[quizIdx % cards.length];
  const others = shuffle(cards.filter(x => x.it !== c.it)).slice(0,3);
  const opts = shuffle([c,...others]);
  content.innerHTML = `
    <div class="quiz-wrap">
      <div class="fc-bar"><div class="fc-bar-fill" style="width:${Math.round(((quizIdx%cards.length)+1)/cards.length*100)}%"></div></div>
      <div class="quiz-q">${c.ru}</div>
      <div class="quiz-sub">Выберите правильный итальянский перевод</div>
      <div class="quiz-opts" id="quizOpts">
        ${opts.map(o=>`<button class="quiz-opt" onclick="quizCheck(this,'${escQ(o.it)}','${escQ(c.it)}')">${o.it}\n${o.pr}</button>`).join("")}
      </div>
      <div class="quiz-stats">
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${qC}</div><div class="stat-lbl">Правильно</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${qW}</div><div class="stat-lbl">Ошибок</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--accent2)">${qS}</div><div class="stat-lbl">Серия</div></div>
      </div>
      <button onclick="resetQuiz()" style="font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;">↺ Начать заново</button>
    </div>`;
}

function escQ(s) { return s.replace(/'/g,"\\'"); }

function quizCheck(btn, chosen, correct) {
  const btns = document.querySelectorAll(".quiz-opt");
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent.startsWith(correct)) b.classList.add("correct");
  });
  if (chosen === correct) { qC++; qS++; }
  else { qW++; qS=0; btn.classList.add("wrong"); }
  setTimeout(() => { quizIdx++; renderQuiz(); }, 900);
}

function resetQuiz() { quizIdx=0; qC=0; qW=0; qS=0; renderQuiz(); }


function renderType() {
  const cards = getFiltered();
  const content = document.getElementById("mainContent");
  if (!cards.length) { content.innerHTML = `<div class="empty">Нет фраз</div>`; return; }
  const c = cards[typeIdx % cards.length];
  content.innerHTML = `
    <div class="type-wrap">
      <div class="fc-bar"><div class="fc-bar-fill" style="width:${Math.round(((typeIdx%cards.length)+1)/cards.length*100)}%"></div></div>
      <div class="type-q">${c.ru}</div>
      <div class="type-sub">Введи по-итальянски</div>
      <input class="type-input" id="typeInp" placeholder="scrivi in italiano..." onkeydown="if(event.key==='Enter')checkType()">
      <div class="type-fb" id="typeFb"></div>
      <button class="type-check" onclick="checkType()">Проверить →</button>
      <div class="quiz-stats" style="margin-top:1.5rem;">
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${tC}</div><div class="stat-lbl">Правильно</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${tW}</div><div class="stat-lbl">Ошибок</div></div>
      </div>
      <button onclick="typeSkip()" style="font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;margin-top:8px;">Пропустить →</button>
    </div>`;
  typeAnswered = false;
  document.getElementById("typeInp").focus();
}

function norm(s) {
  return s.toLowerCase().trim()
    .replace(/[àáâã]/g,"a").replace(/[èéêë]/g,"e")
    .replace(/[ìíîï]/g,"i").replace(/[òóôõ]/g,"o")
    .replace(/[ùúûü]/g,"u").replace(/[!?,\.]/g,"").replace(/\s+/g," ");
}

function checkType() {
  if (typeAnswered) { typeIdx++; renderType(); return; }
  const cards = getFiltered();
  const c = cards[typeIdx % cards.length];
  const val = document.getElementById("typeInp").value;
  const fb = document.getElementById("typeFb");
  const ok = norm(val) === norm(c.it);
  if (ok) {
    fb.textContent = "✓ Правильно!";
    fb.style.color = "var(--green)";
    tC++;
    typeAnswered = true;
    setTimeout(() => { typeIdx++; renderType(); }, 1100);
  } else {
    fb.textContent = "✗  " + c.it + "  (" + c.pr + ")";
    fb.style.color = "var(--red)";
    tW++;
    typeAnswered = true;
  }
}

function typeSkip() { typeIdx++; renderType(); }


function openSidebar() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}


buildNav();
render();
</script>
